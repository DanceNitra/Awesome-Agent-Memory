name: Star-order check

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Open-Source section is sorted by stars
        run: python3 scripts/check_star_order.py README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
