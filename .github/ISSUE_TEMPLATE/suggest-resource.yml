name: Suggest a resource
description: Suggest a product, paper, benchmark, tutorial, or article for the list
title: "[Suggestion] "
labels: ["suggestion"]
body:
  - type: input
    id: name
    attributes:
      label: Resource name
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Primary link (homepage / arXiv / GitHub)
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Product (open-source)
        - Product (closed-source)
        - Tutorial
        - Survey
        - Benchmark
        - Paper (nonparametric memory)
        - Paper (parametric memory)
        - Paper (agent evolution)
        - Paper (cognitive science)
        - Memory security & defense
        - Article
        - Workshop
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why it belongs on the list
      description: One or two factual sentences. Include the code link if open-source.
    validations:
      required: true
  - type: input
    id: affiliation
    attributes:
      label: Your affiliation with the resource
      description: e.g. author, maintainer, employee, investor, user, none. Affiliated submissions are welcome — they just follow the same rules as everything else.
    validations:
      required: true
  - type: dropdown
    id: evidence
    attributes:
      label: How are performance / benchmark claims supported?
      options:
        - No performance claims made
        - Self-reported (vendor or author)
        - Paper-reported (arXiv or peer-reviewed)
        - Independently verified (third party)
    validations:
      required: true
  - type: input
    id: license
    attributes:
      label: License (open-source resources)
      description: e.g. MIT, Apache-2.0. Leave blank for closed-source products, papers, or articles.
    validations:
      required: false
